<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Bank - ATM</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar navbar-light poke-header">
        <a class="navbar-brand font-weight-bold" href="#">Pokémon Bank ATM</a>
        <a href="login.html" class="btn btn-danger">Salir</a>
    </nav>

    <div class="container mt-5">
        <div class="alert alert-info card-custom">
            <h4>Bienvenido, <strong>Ash Ketchum</strong></h4>
            <p class="mb-0">Número de Cuenta: <strong>0987654321</strong></p>
        </div>

        <h3 class="text-center my-4">¿Qué transacción deseas realizar?</h3>

        <div class="row">
            <div class="col-md-4 mb-3">
                <button class="btn poke-btn btn-block py-3">Depositar</button>
            </div>
            <div class="col-md-4 mb-3">
                <button class="btn poke-btn btn-block py-3">Retirar</button>
            </div>
            <div class="col-md-4 mb-3">
                <button class="btn poke-btn btn-block py-3">Consultar Saldo</button>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <button class="btn btn-outline-secondary border-dark btn-block py-3">Pago: Energía Eléctrica</button>
            </div>
            <div class="col-md-4 mb-3">
                <button class="btn btn-outline-secondary border-dark btn-block py-3">Pago: Internet</button>
            </div>
            <div class="col-md-4 mb-3">
                <button class="btn btn-outline-secondary border-dark btn-block py-3">Pago: Telefonía y Agua</button>
            </div>
        </div>

        <hr class="my-4">

        <div class="row justify-content-center">
            <div class="col-md-5 mb-3">
                <a href="historial.html" class="btn btn-dark btn-block py-2">Ver Historial de Transacciones</a>
            </div>
            <div class="col-md-5 mb-3">
                <a href="graficos.html" class="btn btn-dark btn-block py-2">Ver Gráfico de Análisis</a>
            </div>
        </div>
    </div>

</body>
</html>
