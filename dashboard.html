<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Bank - ATM</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar navbar-light poke-header">
        <a class="navbar-brand font-weight-bold" href="#">Pokémon Bank ATM</a>
        <a href="index.html" class="btn btn-danger">Salir</a>
    </nav>

    <div class="container mt-5">
        <div class="alert alert-info card-custom">
            <h4>Bienvenido, <strong id="lblUserName">Cargando...</strong></h4>
            <p class="mb-1">Número de Cuenta: <strong id="lblAccountNumber">Cargando...</strong></p>
            <p class="mb-0">Saldo Disponible: <strong id="lblBalance">$0.00</strong></p>
        </div>

        <h3 class="text-center my-4">¿Qué transacción deseas realizar?</h3>

        <div class="row">
            <div class="col-md-6 mb-3">
                <button id="btnDeposit" class="btn poke-btn btn-block py-3">Depositar</button>
            </div>
            <div class="col-md-6 mb-3">
                <button id="btnWithdraw" class="btn poke-btn btn-block py-3">Retiro sin tarjeta</button>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <button id="btnPayEnergy" class="btn btn-outline-secondary border-dark btn-block py-3">Pago: Energía Eléctrica</button>
            </div>
            <div class="col-md-4 mb-3">
                <button id="btnPayInternet" class="btn btn-outline-secondary border-dark btn-block py-3">Pago: Internet</button>
            </div>
            <div class="col-md-4 mb-3">
                <button id="btnPayWater" class="btn btn-outline-secondary border-dark btn-block py-3">Pago: Telefonía y Agua</button>
            </div>
        </div>

        <hr class="my-4">

        <div class="row justify-content-center">
            <div class="col-md-5 mb-3">
                <a href="historial.html" class="btn btn-dark btn-block py-2">Ver Historial de Transacciones</a>
            </div>
            <div class="col-md-5 mb-3">
                <a href="graficos.html" class="btn btn-dark btn-block py-2">Ver Gráfico de Análisis</a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="storage.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
